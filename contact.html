<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Café - Plush Café</title>
    <link rel="stylesheet" type="text/css" href="/css/styles.css" />
    <script src="https://kit.fontawesome.com/eb416f51b7.js" crossorigin="anonymous"></script>
  <body>
    <header>
      <div>
        <img alt="logo" />
      </div>
      <div id="dive-nav">
        <nav>
          <ul>
            <li><a class="lien-header" href="index.html">Accueil</a></li>
            <li><a class="lien-header" href="about.html">A propos</a></li>
            <li><a class="lien-header" href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <main id="contact-main">
      <form class="contact-form">
        <div class="form-group">
          <label class="form-label" for="nom">Nom</label><br><br>
          <input class="form-input" type="text" id="nom" name="nom">
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label><br><br>
          <input class="form-input" type="email" id="email" name="email">
        </div>
          <div class="form-group">
            <label class="form-label" for="message">Message</label><br><br>
            <textarea class="form-input" id="message" name="message"rows="5"></textarea>
        </div>
        <button class="btn-submit" type="submit">Envoyer</button>
      </form>
    </main>
    <footer>
      <div class="footer-contact">
        <div class="footer-logo">
          <img class="logo-jpg" src="" alt="logo" width="80" />
        </div>
        <div class="footer-address">
          <h2 class="title-footer">Adresse</h2>
          <p>Rue du Château Massart 70 <br />4000 Liège</p>
          <a href="https://maps.app.goo.gl/zfrf44gj1oo4zcrD7">Google Maps</a>
        </div>
        <div class="footer-reseaux">

          <ul>
            <li>
              <a href="#"><i class="fa-brands fa-facebook"></i></a>
            </li>
            <li>

            </li>
            <li>

            </li>
            <li>
              <a href="#"><i class="fa-brands fa-tiktok"></i></a>
            </li>
          </ul>
        </div>
      </div>
      <div class="footer-copyright">
        <p>© <span>2025</span> Demaret Olivia</p>
      </div>
    </footer>
  </body>
</html>
