<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <meta
      name="description"
      content="Push Café, votre nouveau café branché à Liège. Rencontrez notre équipe!"
    />
    <!-- Open Graph -->
    <meta property="og:title" content="Plush Café" />
    <meta property="og:description" content="Plush Café, votre nouveau café branché à Liège." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" />
    <meta property="og:url" content="https://oliviademaret.github.io/plush-cafe/" />
    <meta property="og:type" content="website" />
    
    <title>Café - Plush Café</title>
    <link rel="stylesheet" type="text/css" href="./css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Alan+Sans:wght@300..900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/eb416f51b7.js" crossorigin="anonymous"></script>
  <body>
    <header>
      <div>
        <img src="./img/plush-cafe-logo.webp" alt="logo" width="80px"/>
      </div>
      <div id="dive-nav">
        <nav>
          <ul>
            <li><a class="lien-header" href="index.html">Accueil</a></li>
            <li><a class="lien-header" href="about.html">A propos</a></li>
            <li><a class="lien-header" href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <main id="contact-main">
      <form class="contact-form">
        <h2>Contactez-nous !</h2>
        <div class="form-group">
          <label class="form-label" for="nom">Nom</label><br><br>
          <input class="form-input" type="text" id="nom" name="nom" placeholder="Nom obligatoire" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="prenom">Prénom</label><br><br>
          <input class="form-input" type="text" id="nom" name="prenom" placeholder="Prénom obligatoire" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label><br><br>
          <input class="form-input" type="email" id="email" name="email" placeholder="Email obligatoire" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="sujet">Sujet</label><br><br>
          <select class="form-input" id="sujet" name="sujet" required>
            <option value="">-- Choisir --</option>
            <option value="info">Information</option>
            <option value="devis">Devis</option>
            <option value="autre">Autre</option>
          </select>
        </div>
        <div class="form-group">
            <label class="form-label" for="message">Message</label><br><br>
            <textarea class="form-input" id="message" name="message"rows="5" placeholder="Votre Message" required></textarea>
        </div>
        <button class="btn-submit" type="submit">Envoyer</button>
      </form>
    </main>
    <footer>
      <div class="footer-contact">
        <div class="footer-logo">
        <img class="logo-jpg" src="./img/plush-cafe-logo.webp " alt="logo" width="80px" />
        </div>
        <div class="footer-address">
          <h2 class="title-footer">Adresse</h2>
          <p>Rue du Château Massart 70 <br />4000 Liège</p>
          <a href="https://maps.app.goo.gl/zfrf44gj1oo4zcrD7">Google Maps</a>
        </div>
        <div class="footer-reseaux">
          <h2 class="title-footer">Réseaux sociaux</h2>
          <ul>
            <li>
              <a href="#"><i class="fa-brands fa-facebook"></i></a>
            </li>
            <li>
              <a href="#"><i class="fa-brands fa-instagram"></i></a>
            </li>
            <li>
              <a href="#"><i class="fa-brands fa-youtube"></i></a>
            </li>
            <li>
              <a href="#"><i class="fa-brands fa-tiktok"></i></a>
            </li>
          </ul>
        </div>
      </div>
      <div class="footer-copyright">
        <p>© <span>2025</span> Demaret Olivia</p>
      </div>
    </footer>
  </body>
</html>
