<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Push Café, votre nouveau café branché à Liège. Contactez nous!" />

    <!-- Open Graph -->
    <meta property="og:title" content="Plush Café" />
    <meta property="og:description" content="Plush Café, votre nouveau café branché à Liège." />
    <meta
      property="og:image"
      content="https://oliviademaret.github.io/plush-cafe/img/nathan-dumlao-6VhPY27jdps-unsplash.webp"
    />
    <meta property="og:url" content="https://oliviademaret.github.io/plush-cafe/" />
    <meta property="og:type" content="website" />

    <title>Contact - Plush Café</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Custom style et font -->
    <link rel="stylesheet" type="text/css" href="./css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Alan+Sans:wght@300..900&display=swap" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/eb416f51b7.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <!-- HEADER / NAVBAR -->
    <header>
      <nav class="navbar navbar-expand-md" id="main-navbar">
        <div class="container-fluid px-4">
          <a class="navbar-brand p-0" href="index.html">
            <img src="./img/plush-cafe-logo.webp" alt="logo" width="80" />
          </a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navMenu"
            aria-controls="navMenu"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse justify-content-end" id="navMenu">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link lien-header" href="index.html">Accueil</a>
              </li>
              <li class="nav-item">
                <a class="nav-link lien-header" href="about.html">A propos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link lien-header" href="contact.html">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <!-- MAIN -->
    <main id="contact-main">
      <div class="container py-5">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6">
            <form class="contact-form">
              <h2 class="mb-4">Contactez-nous !</h2>

              <div class="form-group">
                <label class="form-label" for="nom">Nom</label>
                <input class="form-input" type="text" id="nom" name="nom" placeholder="Nom obligatoire" required />
              </div>

              <div class="form-group">
                <label
                  class="form-label"
                  for="prenom"
                  data-bs-toggle="tooltip"
                  data-bs-placement="top"
                  data-bs-custom-class="custom-tooltip"
                  data-bs-title="Obligatoire"
                  >Prénom</label
                >
                <input
                  class="form-input"
                  type="text"
                  id="prenom"
                  name="prenom"
                  placeholder="Prénom obligatoire"
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input
                  class="form-input"
                  type="email"
                  id="email"
                  name="email"
                  placeholder="Email obligatoire"
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label" for="sujet">Sujet</label>
                <select class="form-input" id="sujet" name="sujet" required>
                  <option value="">-- Choisir --</option>
                  <option value="info">Information</option>
                  <option value="devis">Devis</option>
                  <option value="autre">Autre</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label" for="message">Message</label>
                <textarea
                  class="form-input"
                  id="message"
                  name="message"
                  rows="5"
                  placeholder="Votre Message"
                  required
                ></textarea>
              </div>

              <button class="btn-submit" type="submit">Envoyer</button>
            </form>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <footer>
      <div class="container">
        <div class="row align-items-start justify-content-between footer-contact py-4">
          <div class="col-12 col-md-4 col-lg-4 d-flex justify-content-center footer-logo mb-3 mb-md-0">
            <img class="logo-jpg" src="./img/plush-cafe-logo.webp" alt="logo" width="80" />
          </div>

          <div class="col-12 col-md-4 col-lg-4 footer-address text-center mb-3 mb-md-0">
            <h2 class="title-footer">Adresse</h2>
            <p>Rue du Château Massart 70 <br />4000 Liège</p>
            <a href="https://maps.app.goo.gl/zfrf44gj1oo4zcrD7">Google Maps</a>
          </div>

          <div class="col-12 col-md-4 col-lg-4 footer-reseaux text-center">
            <h2 class="title-footer">Réseaux sociaux</h2>
            <ul class="list-unstyled d-flex justify-content-center gap-3">
              <li>
                <a href="#"><i class="fa-brands fa-facebook"></i></a>
              </li>
              <li>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
              </li>
              <li>
                <a href="#"><i class="fa-brands fa-youtube"></i></a>
              </li>
              <li>
                <a href="#"><i class="fa-brands fa-tiktok"></i></a>
              </li>
            </ul>
          </div>
        </div>

        <div class="row">
          <div class="col-12 footer-copyright text-center pt-2 pb-3">
            <p>© <span>2025</span> Demaret Olivia</p>
          </div>
        </div>
      </div>
    </footer>

    <!-- Bootstrap bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
